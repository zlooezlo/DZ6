apiVersion: v1
kind: Namespace
metadata:
  name: cluster-smoke-test
---
apiVersion: v1
kind: Pod
metadata:
  name: toolbox-kube2
  namespace: cluster-smoke-test
  labels:
    app.kubernetes.io/name: cluster-toolbox
spec:
  nodeName: kube2
  restartPolicy: Never
  containers:
    - name: toolbox
      image: busybox:1.36.1
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
---
