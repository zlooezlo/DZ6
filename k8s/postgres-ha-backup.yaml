apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-ha-backups
  namespace: homework
  labels:
    app.kubernetes.io/name: postgres-ha-backup
    app.kubernetes.io/part-of: dz6
spec:
  storageClassName: nfs-csi
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ha-backup-to-database
  namespace: homework
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres-ha
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres-ha-backup
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ha-backup-egress
  namespace: homework
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres-ha-backup
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: postgres-ha
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-ha-backup
  namespace: homework
  labels:
    app.kubernetes.io/name: postgres-ha-backup
    app.kubernetes.io/part-of: dz6
spec:
  schedule: "0 2 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-ha-backup
            app.kubernetes.io/part-of: dz6
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          terminationGracePeriodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 26
            runAsGroup: 102
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: postgres:15.18-bookworm
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  set -eu
                  umask 077

                  STAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  FINAL="/backup/app-${STAMP}.dump"
                  TEMP="${FINAL}.part"

                  cleanup() {
                    rm -f "$TEMP"
                  }

                  trap cleanup EXIT

                  echo "backup_started_at=$(date -u +%FT%TZ)"
                  echo "backup_primary=$(psql -Atc \
                    'SELECT inet_server_addr() || '\''|'\'' || pg_is_in_recovery();')"

                  SOURCE_STATS=$(psql -At -F '|' -c '
                    SELECT
                      COUNT(*),
                      COALESCE(MAX(id), 0),
                      (SELECT COUNT(*) FROM persistence_proof)
                    FROM visits;
                  ')

                  echo "source_stats=${SOURCE_STATS}"

                  pg_dump \
                    --format=custom \
                    --compress=6 \
                    --no-owner \
                    --no-acl \
                    --file="$TEMP"

                  pg_restore --list "$TEMP" >/dev/null

                  mv "$TEMP" "$FINAL"
                  trap - EXIT

                  sha256sum "$FINAL" \
                    | tee "${FINAL}.sha256"

                  find /backup \
                    -type f \
                    -name 'app-*.dump' \
                    -mtime +7 \
                    -delete

                  find /backup \
                    -type f \
                    -name 'app-*.dump.sha256' \
                    -mtime +7 \
                    -delete

                  echo "backup_file=${FINAL}"
                  echo "backup_size=$(stat -c %s "$FINAL")"
                  echo "backup_finished_at=$(date -u +%FT%TZ)"
                  echo "PASS: backup created and pg_restore catalog validated"
              env:
                - name: HOME
                  value: /tmp
                - name: PGHOST
                  value: postgres-ha-rw.homework.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  value: app
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-ha-app
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-ha-app
                      key: password
                - name: PGSSLMODE
                  value: verify-full
                - name: PGSSLROOTCERT
                  value: /etc/postgres-ha-ca/ca.crt
                - name: PGCONNECT_TIMEOUT
                  value: "5"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: server-ca
                  mountPath: /etc/postgres-ha-ca
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: postgres-ha-backups
            - name: server-ca
              secret:
                secretName: postgres-ha-server-ca
                defaultMode: 0444
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
